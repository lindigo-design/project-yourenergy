<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="YourEnergy — find exercises by muscle groups, body parts and equipment"
    />

  <link rel="icon" type="image/png" href="/favicon-96x96.png?v=3" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
  <link rel="shortcut icon" href="/favicon.ico?v=3" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
  <link rel="manifest" href="/webmanifest.json?v=3" />


    <title>YourEnergy</title>
    
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- HEADER -->
    <load src="./partials/header.html" />
    <main>
      <!-- HERO -->
      <load src="./partials/hero.html" />

      <!-- FILTERS + CATEGORIES + EXERCISES -->
      <section class="home-exercises-section" data-section="catalog">
  <div class="container home-exercises-layout">
    <load src="./partials/exercises.html" />

    <div class="home-exercises-content">
      <aside class="home-exercises-sidebar">
        <load src="./partials/quote.html" />
      </aside>

      <div class="home-exercises-main">
        <div class="categories-wrapper" data-section="categories">
          <ul class="categories-list" id="categories-container" role="list"></ul>
        </div>

        <div class="exercises-wrapper visually-hidden" data-section="exercises-list">
          <ul class="exercises-list" id="exercises-container" role="list"></ul>
        </div>

        <div class="pagination" id="pagination-container"></div>
      </div>
    </div>
  </div>
</section>
    </main>

    <!-- FOOTER -->
    <load src="./partials/footer.html" />

    <!-- SCROLL UP -->
    <button
      class="scroll-up"
      aria-label="Scroll to top"
      hidden
      >
     <svg class="scroll-up-icon" width="24" height="24">
    <use href="./images/sprite.svg#icon-arrow-top-right"></use>
  </svg>
  </button>

    <load src="./partials/exercice-modal.html" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
