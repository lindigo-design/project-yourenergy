

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="YourEnergy — your favorite exercises" />
    <title>YourEnergy — Favorites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <load src="./partials/header.html" />

    <main>
      <section class="favorites-section" data-section="favorites-page">
        <div class="container">
          <h2 class="favorites-title">Favorites</h2>
        </div>

        <div class="favorites-wrapper container">
          <div class="favorites-quote-wrap">
            <load src="./partials/quote.html" />
          </div>

          <div class="favorites-list-wrapper">
            <p class="favorites-empty-text">
              It appears that you haven't added any exercises to your
              favorites yet. To get started, you can add exercises that you
              like to your favorites for easier access in the future.
            </p>

            <ul class="favorites-list"></ul>

            <div class="favorites-pagination"></div>
          </div>
        </div>
      </section>
    </main>

    <load src="./partials/footer.html" />

    <button
      class="scroll-up"
      data-section="scroll-up"
      aria-label="Scroll to top"
      hidden
    ></button>

    <load src="./partials/exercice-modal.html" />

    <script type="module" src="./favorites-main.js"></script>
  </body>
</html>
